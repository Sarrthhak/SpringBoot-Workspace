<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Secure portal to access your account dashboard. Log in with your registered username and password.">
    <title>Secure Login - LoginApp</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <!-- Animated decorative circles -->
    <div class="background-decorations">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>

    <main class="card-container">
        <header class="card-header">
            <h1>Welcome Back</h1>
            <p>Please enter your credentials to log in</p>
        </header>

        <!-- Error Alerts -->
        <div th:if="${error}" class="alert alert-error" id="login-error-alert">
            <span>⚠️</span>
            <span th:text="${error}">Error details here</span>
        </div>

        <!-- Success Alerts (e.g. after registration) -->
        <div th:if="${success}" class="alert alert-success" id="login-success-alert">
            <span>✅</span>
            <span th:text="${success}">Success message here</span>
        </div>

        <form th:action="@{/login}" method="post" id="login-form">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <div class="input-wrapper">
                    <input type="text" 
                           id="username" 
                           name="username" 
                           class="form-input" 
                           placeholder="Enter your username" 
                           required 
                           autocomplete="username" />
                </div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="input-wrapper">
                    <input type="password" 
                           id="password" 
                           name="password" 
                           class="form-input" 
                           placeholder="••••••••" 
                           required 
                           autocomplete="current-password" />
                </div>
            </div>

            <button type="submit" class="btn-submit" id="login-submit-btn">Sign In</button>
        </form>

        <footer class="card-footer">
            Don't have an account? <a th:href="@{/signup}" id="signup-link">Create one now</a>
        </footer>
    </main>

</body>
</html>
