<!DOCTYPE html>

<html>


<body>


	<h2>Create Employee</h2>


	<form action="/create" method="post">


		Name:

		<input name="name">


		<br><br>


		Age:

		<input name="age">


		<br><br>



		Designation:


		<select name="designation">


			<option>
				Programmer
			</option>


			<option>
				Manager
			</option>


			<option>
				Tester
			</option>


		</select>


		<br><br>


		Salary:

		<input name="salary">


		<br><br>


		<button>
			Create
		</button>


	</form>


</body>

</html>
